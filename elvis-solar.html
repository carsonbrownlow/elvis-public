<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Elvis — the system</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#04050a;color:#e9ecf2;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
  #scene{position:fixed;inset:0}
  .lab{font-size:12.5px;color:#c3ccdb;text-shadow:0 0 10px #000,0 0 5px #000;letter-spacing:.04em;pointer-events:none;white-space:nowrap;opacity:.0;transition:opacity .4s}
  .lab.on{opacity:.78}
  .lab.star{font-size:14px;font-weight:600;letter-spacing:.08em}
  .lab.star.on{opacity:1}
  #hdr{position:fixed;top:15px;left:18px;z-index:5}
  #hdr h1{font-size:13px;font-weight:600;letter-spacing:.14em;color:#eef1f7}
  #hdr p{font-size:11px;color:#7b8395;margin-top:3px}
  #foot{position:fixed;bottom:13px;left:0;right:0;text-align:center;font-size:11px;color:#565d6e;z-index:5;pointer-events:none;transition:opacity .3s}
  /* card */
  #card{position:fixed;top:0;right:0;height:100%;width:min(360px,88vw);z-index:8;
    background:linear-gradient(180deg,rgba(10,13,20,.94),rgba(8,10,16,.97));backdrop-filter:blur(16px);
    border-left:1px solid rgba(120,140,190,.18);box-shadow:-20px 0 60px rgba(0,0,0,.5);
    transform:translateX(102%);transition:transform .42s cubic-bezier(.16,.84,.3,1);padding:26px 22px;overflow-y:auto}
  #card.open{transform:translateX(0)}
  #card .close{position:absolute;top:16px;right:18px;font-size:22px;color:#6b7385;cursor:pointer;line-height:1}
  #card .kind{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#8a93a6}
  #card h2{font-size:23px;margin:5px 0 0;font-weight:600}
  #card .crole{font-size:13.5px;color:#aeb8c9;line-height:1.55;margin:12px 0 20px}
  #card .seclbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;color:#6f7889;margin:0 0 8px}
  .pipe{border:1px solid rgba(120,140,190,.14);border-radius:11px;margin-bottom:8px;overflow:hidden;background:rgba(255,255,255,.015)}
  .pipe .ph{display:flex;align-items:center;gap:10px;padding:12px 13px;cursor:pointer;user-select:none}
  .pipe .ph:hover{background:rgba(255,255,255,.03)}
  .pipe .pdot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .pipe .pname{font-size:14px;font-weight:500;flex:1}
  .pipe .chev{color:#6b7385;font-size:12px;transition:transform .3s}
  .pipe.x .chev{transform:rotate(90deg)}
  .pipe .pbody{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .pipe.x .pbody{max-height:200px}
  .pipe .pbody .inner{padding:0 13px 13px;font-size:12.5px;color:#aeb8c9;line-height:1.5}
  .pipe .pid{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:#7f93c4;margin-top:7px;word-break:break-all}
  .empty{font-size:13px;color:#7b8395;font-style:italic}
</style>
</head>
<body>
<div id="hdr"><h1>ELVIS · THE SYSTEM</h1><p>it all orbits you &amp; me · drag to orbit · tap a planet</p></div>
<div id="scene"></div>
<div id="foot">tap a planet to open it · tap empty space to close</div>
<div id="card"><span class="close" id="cardClose">×</span><div class="kind" id="cKind"></div><h2 id="cName"></h2><div class="crole" id="cRole"></div><div id="cPipesWrap"><div class="seclbl">pipelines</div><div id="cPipes"></div></div></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const PLANETS = [
  { id:'general', name:'General', kind:'Agent · always-on', color:0x6f9bf2, R:62, speed:0.07, size:4.0,
    role:'The main agent — your comms + execution. Reads and writes the whole core; sends Telegram and iMessage; runs the work.',
    pipes:[
      {n:'telegram', id:'general.elvis.telegram', d:'Your primary channel. Inbound poller → event bus → General acts.'},
      {n:'imessage', id:'general.elvis.imessage', d:'You → Elvis over iMessage.'},
      {n:'heartbeat', id:'general.elvis.heartbeat', d:'The scheduler — fires every timed task from heartbeats.yaml.'},
      {n:'inbox', id:'general.elvis.inbox', d:'Your inbox items + intel relays from the Watcher.'},
    ]},
  { id:'watcher', name:'The Watcher', kind:'Agent · always-on', color:0x4fd6a6, R:98, speed:0.045, size:3.5,
    role:'Always-on observer. Sees everything, acts on nothing — watches your world (including your Telegram) to learn you faster, and relays signal to General.',
    pipes:[
      {n:'gmail', id:'watcher.elvis.gmail', d:'Triages incoming mail; relays what matters.'},
      {n:'calendar', id:'watcher.elvis.calendar', d:'Watches calendar changes.'},
      {n:'shortcuts', id:'watcher.elvis.shortcuts', d:'Catches the shortcuts you fire from your phone.'},
      {n:'bookmarks', id:'watcher.elvis.bookmarks', d:'Pulls your X bookmarks for triage.'},
      {n:'photos', id:'watcher.elvis.photos', d:'Observes new photos as they sync.'},
      {n:'imessage', id:'watcher.elvis.imessage', d:'Observes all your texts — to learn your voice + life.'},
    ]},
  { id:'auditor', name:'The Auditor', kind:'Agent · forming', color:0xb89bff, R:134, speed:0.026, size:2.9, faint:true,
    role:'Independent devil’s-advocate on the big calls. Not built yet — a planet still forming.', pipes:[] },
  { id:'advisor', name:'The Advisor', kind:'Vehicle · chat', color:0xffa64d, R:170, speed:0.017, size:2.5, faint:true,
    role:'Elvis on a chat product (Claude.ai / ChatGPT). DB-connected — becomes Elvis the moment you talk to it.', pipes:[] },
];

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 6000);
camera.position.set(0, 105, 220);
const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.getElementById('scene').appendChild(renderer.domElement);
const labelR=new CSS2DRenderer(); labelR.setSize(innerWidth,innerHeight);
labelR.domElement.style.cssText='position:fixed;top:0;left:0;pointer-events:none'; document.body.appendChild(labelR.domElement);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.05; controls.minDistance=40; controls.maxDistance=420;
controls.autoRotate=true; controls.autoRotateSpeed=0.18; controls.enablePan=false;

// subtle starfield
(function(){const g=new THREE.BufferGeometry(),n=1100,p=new Float32Array(n*3);
 for(let i=0;i<n;i++){const r=900+Math.random()*1700,t=Math.random()*6.283,ph=Math.acos(2*Math.random()-1);
 p[i*3]=r*Math.sin(ph)*Math.cos(t);p[i*3+1]=r*Math.sin(ph)*Math.sin(t);p[i*3+2]=r*Math.cos(ph);}
 g.setAttribute('position',new THREE.BufferAttribute(p,3));
 scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x8896b4,size:1.1,sizeAttenuation:false,transparent:true,opacity:.7})));})();

scene.add(new THREE.AmbientLight(0x2c3650,1.0));
scene.add(new THREE.PointLight(0xffd8a0,1.7,0,0.9));

const pickables=[];
function lab(text,cls){const d=document.createElement('div');d.className='lab '+(cls||'');d.textContent=text;const o=new CSS2DObject(d);o.userData.el=d;return o;}

// binary heart
const heart=new THREE.Object3D(); scene.add(heart);
function star(color,x,name,role,cls){
  const m=new THREE.Mesh(new THREE.SphereGeometry(4.0,48,48),new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:1.4,roughness:.4,metalness:.1}));
  m.position.x=x; heart.add(m);
  m.add(new THREE.Mesh(new THREE.SphereGeometry(5.0,32,32),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.07})));
  m.userData={card:{kind:'The center',name,role,color:'#'+color.toString(16),pipes:null}}; pickables.push(m);
  const l=lab(name,'star '+cls); l.position.set(0,8,0); m.add(l); l.userData.el.classList.add('on');
  return m;
}
const carson=star(0xfff1d6,13,'Carson','You. The whole system exists for you — every body here orbits this point. The north star is your mission.','');
const elvis =star(0xffba6e,-13,'Elvis','The identity itself — the Supabase core (v2_truth, intel, hypotheses). Any model that loads it becomes Elvis. The model is just the vehicle.','');

function ring(r,c,op){const g=new THREE.RingGeometry(r-0.1,r+0.1,180);const m=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:op,side:THREE.DoubleSide}));m.rotation.x=Math.PI/2;scene.add(m);return m;}

const planets=[];
PLANETS.forEach((pl,pi)=>{
  ring(pl.R,pl.color,pl.faint?0.05:0.12);
  const pivot=new THREE.Object3D(); pivot.rotation.y=[0.7,2.5,4.2,5.6][pi]; scene.add(pivot);
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(pl.size,44,44),
    new THREE.MeshStandardMaterial({color:pl.color,emissive:pl.color,emissiveIntensity:pl.faint?0.4:1.0,roughness:.55,metalness:.15,transparent:!!pl.faint,opacity:pl.faint?0.5:1}));
  mesh.position.x=pl.R; pivot.add(mesh);
  mesh.userData={card:{kind:pl.kind,name:pl.name,role:pl.role,color:'#'+pl.color.toString(16),pipes:pl.pipes}}; pickables.push(mesh);
  const l=lab(pl.name); l.position.set(0,pl.size+2.4,0); mesh.add(l); l.userData.el.classList.add('on');
  planets.push({pl,pivot,mesh});
});

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.5,0.5,0.55));
composer.addPass(new OutputPass());

// ---- card ----
const card=document.getElementById('card');
function colorDot(c){return `<span class="pdot" style="background:${c}"></span>`;}
function openCard(d){
  document.getElementById('cKind').textContent=d.kind;
  document.getElementById('cName').textContent=d.name;
  document.getElementById('cRole').textContent=d.role;
  const wrap=document.getElementById('cPipesWrap'), host=document.getElementById('cPipes');
  if(d.pipes===null){ wrap.style.display='none'; }
  else if(d.pipes.length===0){ wrap.style.display='block'; host.innerHTML='<div class="empty">No pipelines yet — still forming.</div>'; }
  else{
    wrap.style.display='block';
    host.innerHTML=d.pipes.map(p=>`<div class="pipe"><div class="ph">${colorDot(d.color)}<span class="pname">${p.n}</span><span class="chev">›</span></div><div class="pbody"><div class="inner">${p.d}<div class="pid">${p.id}</div></div></div></div>`).join('');
    host.querySelectorAll('.pipe .ph').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('x'));
  }
  card.classList.add('open'); document.getElementById('foot').style.opacity='0';
}
function closeCard(){card.classList.remove('open'); document.getElementById('foot').style.opacity='1';}
document.getElementById('cardClose').onclick=closeCard;

const ray=new THREE.Raycaster(),m2=new THREE.Vector2();let down=null;
renderer.domElement.addEventListener('pointerdown',e=>down=[e.clientX,e.clientY]);
renderer.domElement.addEventListener('pointerup',e=>{
  if(!down||Math.hypot(e.clientX-down[0],e.clientY-down[1])>7)return;
  m2.x=(e.clientX/innerWidth)*2-1;m2.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(m2,camera);const hit=ray.intersectObjects(pickables,false)[0];
  if(hit)openCard(hit.object.userData.card); else closeCard();
});

const clock=new THREE.Clock();
const STILL=location.search.indexOf('still')>=0; let frames=0;
function animate(){
  const dt=Math.min(clock.getDelta(),0.05),t=clock.elapsedTime;
  controls.update();
  heart.rotation.y+=dt*0.45;
  const b=1+0.04*Math.sin(t*1.3); carson.scale.setScalar(b); elvis.scale.setScalar(1+0.04*Math.sin(t*1.3+1.4));
  planets.forEach(p=>{p.pivot.rotation.y+=dt*p.pl.speed;p.mesh.rotation.y+=dt*0.3;});
  composer.render(); labelR.render(scene,camera);
  if(!(STILL && ++frames>6)) requestAnimationFrame(animate);
}
animate();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);labelR.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
