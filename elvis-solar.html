<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Elvis — the system (live solar map)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#04050a;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:#e9ecf2}
  #scene{position:fixed;inset:0}
  .label{font-size:12px;color:#cfd6e4;text-shadow:0 0 8px #000,0 0 5px #000;letter-spacing:.02em;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .3s}
  .label.show{opacity:.92}
  .label.star{font-size:15px;font-weight:600;opacity:1}
  .label.carson{color:#fff1d6}
  .label.elvis{color:#ffd49a}
  #title{position:fixed;top:14px;left:16px;z-index:5}
  #title h1{font-size:14px;font-weight:600;letter-spacing:.06em}
  #title p{font-size:11px;color:#8a93a6;margin-top:3px;max-width:70vw}
  #hint{position:fixed;bottom:12px;left:0;right:0;text-align:center;font-size:11px;color:#5f677a;z-index:5;pointer-events:none}
  #panel{position:fixed;right:14px;top:50%;transform:translate(120%,-50%);width:min(300px,82vw);
    background:rgba(12,15,23,.88);backdrop-filter:blur(12px);border:1px solid rgba(120,140,190,.25);border-radius:14px;
    padding:16px 16px 18px;z-index:6;transition:transform .35s cubic-bezier(.2,.8,.2,1);box-shadow:0 14px 50px rgba(0,0,0,.6)}
  #panel.open{transform:translate(0,-50%)}
  #panel .k{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:#8a93a6}
  #panel h2{font-size:19px;margin:3px 0 2px}
  #panel .role{font-size:13.5px;color:#c4ccda;margin:8px 0 12px;line-height:1.5}
  #panel .row{display:flex;justify-content:space-between;gap:14px;font-size:12.5px;padding:6px 0;border-top:1px solid rgba(120,140,190,.13)}
  #panel .row span:first-child{color:#8a93a6}
  #panel .row span:last-child{text-align:right}
  #panel .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  #panel .x{position:absolute;top:9px;right:13px;cursor:pointer;color:#8a93a6;font-size:20px;line-height:1}
</style>
</head>
<body>
<div id="title"><h1>ELVIS · THE SYSTEM</h1><p>it all orbits you and me · drag to orbit · scroll to zoom · tap a body</p></div>
<div id="scene"></div>
<div id="hint">tap any body to inspect it</div>
<div id="panel"><div class="x" id="closeBtn">×</div><div class="k" id="p-k">node</div><h2 id="p-name"></h2><div class="role" id="p-role"></div><div id="p-rows"></div></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ---- the fleet ----
const AGENTS = [
  { name:'General', kind:'AGENT · always-on', color:0x5b8def, R:34, speed:0.10, size:3.4,
    role:'The main agent — your comms + execution. Reads/writes the whole core; sends Telegram + iMessage; runs the work.',
    moons:[
      {name:'telegram', full:'general.elvis.telegram', role:'your primary channel'},
      {name:'imessage', full:'general.elvis.imessage', role:'you → Elvis'},
      {name:'heartbeat', full:'general.elvis.heartbeat', role:'the scheduler · heartbeats.yaml'},
      {name:'inbox', full:'general.elvis.inbox', role:'inbox + intel'},
    ]},
  { name:'The Watcher', kind:'AGENT · always-on', color:0x47d6a6, R:60, speed:0.060, size:3.0,
    role:'Always-on observer. Sees everything, acts on nothing — watches your world (incl. your Telegram) to learn you faster, relays signal to General.',
    moons:[
      {name:'gmail', full:'watcher.elvis.gmail'},
      {name:'calendar', full:'watcher.elvis.calendar'},
      {name:'shortcuts', full:'watcher.elvis.shortcuts'},
      {name:'bookmarks', full:'watcher.elvis.bookmarks'},
      {name:'photos', full:'watcher.elvis.photos'},
      {name:'imessage', full:'watcher.elvis.imessage', role:'observes your texts'},
    ]},
  { name:'The Auditor', kind:'AGENT · forming', color:0xb89bff, R:88, speed:0.033, size:2.6, faint:true,
    role:'Independent devil’s-advocate on the big calls. Not built yet — a planet still forming.', moons:[] },
  { name:'The Advisor', kind:'VEHICLE · chat', color:0xffa64d, R:112, speed:0.021, size:2.2, faint:true,
    role:'Elvis on a chat product (Claude.ai / ChatGPT). DB-connected — becomes Elvis the moment you talk to it.', moons:[] },
];

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 5000);
camera.position.set(0, 78, 165);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.getElementById('scene').appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.cssText='position:fixed;top:0;left:0;pointer-events:none';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.06; controls.minDistance=24; controls.maxDistance=460;
controls.autoRotate=true; controls.autoRotateSpeed=0.28;

// starfield
(function(){ const g=new THREE.BufferGeometry(), n=2000, p=new Float32Array(n*3);
  for(let i=0;i<n;i++){const r=700+Math.random()*1600, t=Math.random()*6.283, ph=Math.acos(2*Math.random()-1);
    p[i*3]=r*Math.sin(ph)*Math.cos(t); p[i*3+1]=r*Math.sin(ph)*Math.sin(t); p[i*3+2]=r*Math.cos(ph);}
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x9fb0d0,size:1.3,sizeAttenuation:false})));
})();

scene.add(new THREE.AmbientLight(0x39435e, 1.0));
const coreLight=new THREE.PointLight(0xffd8a0, 3.4, 0, 0.85); scene.add(coreLight);

const pickables=[];
function mkLabel(text,cls){const d=document.createElement('div'); d.className='label '+(cls||''); d.textContent=text; const o=new CSS2DObject(d); o.userData.el=d; return o;}

// ---- the binary heart: Carson + Elvis ----
const heart=new THREE.Object3D(); scene.add(heart);   // rotates → the pair orbit each other
const SEP=7;
function star(color, x, name, kind, role, cls){
  const m=new THREE.Mesh(new THREE.SphereGeometry(5.4,48,48),
    new THREE.MeshStandardMaterial({color, emissive:color, emissiveIntensity:1.7, roughness:.35}));
  m.position.x=x; heart.add(m);
  m.add(new THREE.Mesh(new THREE.SphereGeometry(7.4,32,32), new THREE.MeshBasicMaterial({color, transparent:true, opacity:.10})));
  m.userData={data:{name, kind, role, statusLabel:'live', extra:[]}};
  pickables.push(m);
  const l=mkLabel(name,'star '+cls); l.position.set(0,8.5,0); m.add(l);
  return m;
}
const carson=star(0xfff1d6, SEP, 'Carson', 'THE CENTER', 'You. The whole system exists for you — everything here orbits this point. The north star is your mission.', 'carson');
const elvis =star(0xffb866,-SEP, 'Elvis', 'THE CORE · identity', 'The identity itself — the Supabase DB (v2_truth, cross-instance intel, hypotheses). Every agent loads this and BECOMES Elvis. The model is just the vehicle.', 'elvis');

function ring(r,color,op){const g=new THREE.RingGeometry(r-0.13,r+0.13,160); const me=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color,transparent:true,opacity:op,side:THREE.DoubleSide})); me.rotation.x=Math.PI/2; scene.add(me); return me;}

const planets=[], pulses=[];
AGENTS.forEach(a=>{
  ring(a.R,a.color,a.faint?0.06:0.15);
  const pivot=new THREE.Object3D(); scene.add(pivot); pivot.rotation.y=Math.random()*6.28;
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(a.size,40,40),
    new THREE.MeshStandardMaterial({color:a.color, emissive:a.color, emissiveIntensity:a.faint?0.45:1.15, roughness:.5, transparent:!!a.faint, opacity:a.faint?0.55:1}));
  mesh.position.x=a.R; pivot.add(mesh);
  mesh.userData={data:{name:a.name, kind:a.kind, role:a.role, color:a.color, statusLabel:a.faint?'forming':'live',
    extra:[['vehicle', a.kind.includes('chat')?'chat AI':'autonomous'],['pipelines', String(a.moons.length)]]}};
  pickables.push(mesh);
  const plab=mkLabel(a.name); plab.position.set(0,a.size+2.6,0); mesh.add(plab);
  const moons=[];
  a.moons.forEach((mn,i)=>{
    const mp=new THREE.Object3D(); mesh.add(mp); mp.rotation.y=Math.random()*6.28;
    const mm=new THREE.Mesh(new THREE.SphereGeometry(0.6,18,18),
      new THREE.MeshStandardMaterial({color:a.color, emissive:a.color, emissiveIntensity:.9, roughness:.6}));
    mm.position.x=a.size+3+i*1.6; mp.add(mm);
    mm.userData={data:{name:mn.name, kind:'PIPELINE', role:mn.role||('feeds '+a.name+' through the event bus'), color:a.color,
      statusLabel:'live', extra:[['owner',a.name],['id',mn.full]]}};
    pickables.push(mm);
    const mlab=mkLabel(mn.name); mlab.position.set(0,1.5,0); mm.add(mlab);
    moons.push({mp, speed:0.5+Math.random()*0.8});
  });
  planets.push({a,pivot,mesh,moons});
});

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.95,0.75,0.18));
composer.addPass(new OutputPass());

const ray=new THREE.Raycaster(), m2=new THREE.Vector2(); let down=null;
renderer.domElement.addEventListener('pointerdown',e=>down=[e.clientX,e.clientY]);
renderer.domElement.addEventListener('pointerup',e=>{
  if(!down||Math.hypot(e.clientX-down[0],e.clientY-down[1])>7)return;
  m2.x=(e.clientX/innerWidth)*2-1; m2.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(m2,camera); const hit=ray.intersectObjects(pickables,false)[0];
  if(hit) open(hit.object.userData.data);
});
const panel=document.getElementById('panel');
function open(d){
  document.getElementById('p-k').textContent=d.kind||'node';
  document.getElementById('p-name').textContent=d.name;
  document.getElementById('p-role').textContent=d.role||'';
  const rows=[['status',`<span class="dot" style="background:${d.statusLabel==='forming'?'#b89bff':'#47d6a6'}"></span>${d.statusLabel||'live'}`]].concat(d.extra||[]);
  document.getElementById('p-rows').innerHTML=rows.map(r=>`<div class="row"><span>${r[0]}</span><span>${r[1]}</span></div>`).join('');
  panel.classList.add('open');
}
document.getElementById('closeBtn').onclick=()=>panel.classList.remove('open');

const clock=new THREE.Clock();
function spawnPulse(from){const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([from.x,from.y,from.z]),3));
  const pt=new THREE.Points(g,new THREE.PointsMaterial({color:0xfff0c8,size:2.6,transparent:true,opacity:.95,blending:THREE.AdditiveBlending,depthWrite:false}));
  scene.add(pt); pulses.push({pt,from:from.clone(),t:0});}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;
  controls.update();
  heart.rotation.y+=dt*0.5;                      // Carson + Elvis orbit each other
  carson.scale.setScalar(1+0.05*Math.sin(t*1.4)); elvis.scale.setScalar(1+0.05*Math.sin(t*1.4+1.2)); // breathe
  planets.forEach(p=>{ p.pivot.rotation.y+=dt*p.a.speed; p.mesh.rotation.y+=dt*0.4; p.moons.forEach(m=>m.mp.rotation.y+=dt*m.speed);
    p.mesh.children.forEach(c=>{if(c.userData&&c.userData.el&&c.userData.el.classList.contains('label')&&!c.userData.el.classList.contains('star')) c.userData.el.classList.add('show');}); });
  const zoom=camera.position.length()<120;
  pickables.forEach(o=>{ if(o.userData.data&&o.userData.data.kind==='PIPELINE') o.children.forEach(c=>{if(c.userData&&c.userData.el)c.userData.el.classList.toggle('show',zoom);}); });
  if(Math.random()<0.05){const p=planets[Math.floor(Math.random()*2)]; if(p&&p.moons.length){const wp=new THREE.Vector3(); p.moons[Math.floor(Math.random()*p.moons.length)].mp.children[0].getWorldPosition(wp); spawnPulse(wp);}}
  for(let i=pulses.length-1;i>=0;i--){const pu=pulses[i]; pu.t+=dt*1.0; const pos=pu.from.clone().lerp(new THREE.Vector3(0,0,0),Math.min(pu.t,1));
    pu.pt.geometry.attributes.position.setXYZ(0,pos.x,pos.y,pos.z); pu.pt.geometry.attributes.position.needsUpdate=true; pu.pt.material.opacity=.95*(1-pu.t);
    if(pu.t>=1){scene.remove(pu.pt); pu.pt.geometry.dispose(); pulses.splice(i,1);}}
  composer.render(); labelRenderer.render(scene,camera);
}
animate();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); labelRenderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
