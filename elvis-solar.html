  const l=lab(pl.name); l.position.set(0,pl.size+2.4,0); mesh.add(l); l.userData.el.classList.add('on');

// cinematic grade — filmic S-curve, split-tone, shaped vignette, soft CA, dither (a graded shot, not a render)
const gradePass=new ShaderPass({uniforms:{tDiffuse:{value:null},uVig:{value:0.80},uCA:{value:0.0013},uAspect:{value:innerWidth/innerHeight}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`uniform sampler2D tDiffuse;uniform float uVig;uniform float uCA;uniform float uAspect;varying vec2 vUv;
    float ign(vec2 p){return fract(52.9829189*fract(dot(p,vec2(0.06711056,0.00583715))));}
    void main(){
      vec2 off=(vUv-0.5);
      vec2 da=off; da.x*=uAspect; float r=dot(da,da);
      float ca=uCA*r;
      vec3 col;
      col.r=texture2D(tDiffuse,vUv-off*ca).r;
      col.g=texture2D(tDiffuse,vUv).g;
      col.b=texture2D(tDiffuse,vUv+off*ca).b;
      col=clamp(col,0.0,1.0);
      col=mix(col,col*col*(3.0-2.0*col),0.20);                       // gentle filmic S
      float l=dot(col,vec3(0.299,0.587,0.114));                      // split-tone
      col+=vec3(0.03,0.05,0.11)*(1.0-smoothstep(0.0,0.4,l))*0.45;    //   cool shadows
      col+=vec3(0.10,0.06,0.0)*smoothstep(0.55,1.0,l)*0.35;          //   warm highlights
      float vig=pow(clamp(1.0-uVig*r,0.0,1.0),1.4);                  // shaped vignette
      col*=mix(0.52,1.0,vig);
      col+=(ign(gl_FragCoord.xy)-0.5)/255.0;                         // dither — kill banding
      gl_FragColor=vec4(col,1.0);}`});
composer.addPass(gradePass);

// ---- floating card (CSS3D, anchored in-world to the tapped body) ----
let floater=null;
let activeName=null;
let storyActive=false, storyIndex=0;
const STORY=[
  {name:'North Star', note:'Start with heaven above the system: the wide source of mission, trust, authority, and light that everything flows from.'},
  {name:'Carson', note:'At the heart is the relationship. Carson is the center of gravity; Elvis exists to serve this point.'},
  {name:'Elvis', note:'Elvis is the persona and partner, but the model is only the vehicle. Identity comes from what it loads.'},
  {name:'The Database', note:'The database is the foundation. Any model that loads this memory and operating context becomes Elvis.'},
  {name:'Comms', note:'Comms is the communication layer: every watcher, poller, and worker writes tagged signal into one shared stream so Elvis knows what happened and what should happen next.'},
  {name:'General', note:'General is the acting layer: messages, execution, outbound comms, and day-to-day work.'},
  {name:'The Watcher', note:'The Watcher is the observation layer: always watching, never messaging directly, forwarding signal to General.'},
  {name:'Workers', note:'Workers are temporary force multipliers: spun up for a task, then gone when the job is finished.'},
];
function buildFloaterHTML(d){
  let h=`<div class="faccent" style="background:${d.color};box-shadow:0 0 12px ${d.color}"></div><div class="fkind">${d.kind}</div><h3>${d.name}</h3><div class="frole">${d.role}</div>`;
  if(d.monitor) h+=`<div class="fsec">monitor catches</div><div class="fmono">${d.monitor}</div>`;
  if(d.tables) h+=`<div class="fsec">data layer</div>`+d.tables.map(t=>`<div class="fitem">${t}</div>`).join('');
  if(d.pipes&&d.pipes.length){
    h+=`<div class="fsec">pipelines</div>`+d.pipes.map(p=>`<div class="fitem"><span class="fdot" style="background:${d.color}"></span>${p.n}<span class="ftag">${p.tag||''}</span></div>`).join('');
  } else if(d.pipes&&!d.pipes.length){ h+=`<div class="fsec">pipelines</div><div class="fitem" style="font-style:italic;color:#7b8395">None yet — still forming.</div>`; }
  if(d.out) h+=`<div class="fsec">outbound</div>`+d.out.map(o=>`<div class="fitem">${o}</div>`).join('');
  return h;
}
function buildPanelHTML(d){
  const step=storyActive?STORY[storyIndex]:null;
  let h=`<button class="close" type="button" aria-label="Close">×</button>`;
  if(step) h+=`<div class="storyprog">Story mode · ${storyIndex+1} / ${STORY.length}</div><div class="storynote">${step.note}</div>`;
  h+=`<div class="kind">${d.kind}</div><h2>${d.name}</h2><div class="crole">${d.role}</div>`;
  if(d.monitor) h+=`<div class="seclbl">monitor catches</div><div class="mono">${d.monitor}</div>`;
  if(d.tables) h+=`<div class="seclbl">data layer</div>`+d.tables.map(t=>`<div class="leaf">${t}</div>`).join('');
  if(d.pipes){
    h+=`<div class="seclbl">pipelines</div>`;
    h+=d.pipes.length?d.pipes.map(p=>`<div class="pipe"><div class="ph"><span class="pdot" style="background:${d.color}"></span><span class="pname">${p.n}</span><span class="ptag">${p.tag||''}</span></div><div class="pbody"><div class="inner">${p.d||''}<div class="pid">${p.id||''}</div></div></div></div>`).join(''):`<div class="empty">None yet — still forming.</div>`;
  }
  if(d.out) h+=`<div class="seclbl">outbound</div>`+d.out.map(o=>`<div class="leaf">${o}</div>`).join('');
  if(step) h+=`<div class="storyctrl"><button type="button" data-story="prev" ${storyIndex===0?'disabled':''}>Back</button><button type="button" data-story="exit">Exit</button><button type="button" class="primary" data-story="next">${storyIndex===STORY.length-1?'Finish':'Next'}</button></div>`;
  return h;
}
function setNavActive(name){
  activeName=name||null;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.name===activeName));
  document.querySelector('#nav button.story')?.classList.toggle('active',storyActive);
}
function closeCard(opts={}){
  if(floater){ scene.remove(floater); floater=null; }
  const card=document.getElementById('card'); card.classList.remove('open'); card.innerHTML='';
  if(!opts.keepStory) storyActive=false;
  setNavActive(null);
  document.getElementById('foot').style.opacity='1';
}
function openCard(d,obj){
  closeCard({keepStory:true});
  const el=document.createElement('div'); el.className='floater'; el.innerHTML=buildFloaterHTML(d);
  el.style.boxShadow=`0 14px 55px rgba(0,0,0,.72),inset 0 1px 0 rgba(255,255,255,.15),0 0 26px ${d.color}22`;
  el.style.borderColor=`${d.color}55`;
  floater=new CSS3DObject(el); floater.scale.setScalar(MOBILE?0.0:0.058); floater.userData.anchor=obj||null;
  scene.add(floater);
  const card=document.getElementById('card'); card.innerHTML=buildPanelHTML(d); card.classList.add('open');
  card.querySelector('.close').addEventListener('click',()=>{endStory();focusOn(null);});
  card.querySelectorAll('.pipe .ph').forEach(ph=>ph.addEventListener('click',()=>ph.closest('.pipe').classList.toggle('x')));
  card.querySelector('[data-story="prev"]')?.addEventListener('click',()=>storyStep(-1));
  card.querySelector('[data-story="next"]')?.addEventListener('click',()=>storyStep(1));
  card.querySelector('[data-story="exit"]')?.addEventListener('click',()=>endStory());
  setNavActive(d.name);
  document.getElementById('foot').style.opacity='0';
}
function bodyByName(name){return pickables.find(o=>o.userData.card&&o.userData.card.name===name);}
function showBody(name,opts={}){
  if(storyActive&&!opts.story) storyActive=false;
  const m=bodyByName(name); if(m){openCard(m.userData.card,m); focusOn(m);} return !!m;
}
function storyStep(delta){
  storyIndex+=delta;
  if(storyIndex>=STORY.length){endStory();focusOn(null);return;}
  storyIndex=Math.max(0,storyIndex);
  showBody(STORY[storyIndex].name,{story:true});
}
function startStory(){
  storyActive=true; storyIndex=0;
  holdT=1; introT=1; controls.autoRotate=false;
  storyStep(0);
}
function endStory(){
  storyActive=false;
  closeCard();
}
window.__demo=(name)=>{showBody(name||'General');};
window.__story=()=>startStory();
window.__view=(x,y,z,tx,ty,tz)=>{controls.autoRotate=false;camera.position.set(x,y,z);controls.target.set(tx||0,ty||0,tz||0);controls.update();if(STILL){frames=0;requestAnimationFrame(animate);}};
window.__focus=(name)=>{const m=bodyByName(name); if(m)focusOn(m); return !!m;};

const ray=new THREE.Raycaster(),m2=new THREE.Vector2();let down=null;
renderer.domElement.addEventListener('pointerdown',e=>down=[e.clientX,e.clientY]);
renderer.domElement.addEventListener('pointerup',e=>{
  if(!down||Math.hypot(e.clientX-down[0],e.clientY-down[1])>7)return;
  m2.x=(e.clientX/innerWidth)*2-1;m2.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(m2,camera);const hit=ray.intersectObjects(pickables,false)[0];
  if(hit){showBody(hit.object.userData.card.name);} else {closeCard(); focusOn(null);}
});

const clock=new THREE.Clock();
const STILL=location.search.indexOf('still')>=0; let frames=0;
// intro: open close on the binary (the craft is the first thing you see), then pull back to the whole system
const camStart=new THREE.Vector3(22,8,34), camEnd=camera.position.clone();
let introT=STILL?1:0, holdT=STILL?1:0;
if(!STILL){controls.autoRotate=false; camera.position.copy(camStart); camera.lookAt(0,0,0);}
function animate(){
  const dt=Math.min(clock.getDelta(),0.05),t=clock.elapsedTime;
  if(holdT<1){holdT=Math.min(1,holdT+dt*0.9); camera.position.copy(camStart); camera.lookAt(0,0,0);}
  else if(introT<1){introT=Math.min(1,introT+dt*0.22); const s=introT, e=s*s*s*(s*(s*6.0-15.0)+10.0); camera.position.lerpVectors(camStart,camEnd,e); camera.lookAt(0,0,0); if(introT>=1)controls.autoRotate=true;}
  else if(camTween){
    camTween.el+=dt; const k=Math.min(1,camTween.el/camTween.dur), e=1-Math.pow(1-k,3);
    camera.position.lerpVectors(camTween.fromP,camTween.toP,e);
    controls.target.lerpVectors(camTween.fromT,camTween.toT,e);
    camera.lookAt(controls.target);
    if(k>=1){camTween=null;controls.enabled=true;lastInteract=t;}
  } else if(focusObj){
    focusObj.getWorldPosition(_tv); controls.target.lerp(_tv,0.12); controls.update();
  } else {
    if(!STILL) controls.autoRotate=(t-lastInteract)>3.5;
    controls.update();
  }
  for(let i=0;i<starMats.length;i++) starMats[i].uniforms.uTime.value=t;
  for(let i=0;i<cloudMats.length;i++) cloudMats[i].uniforms.uTime.value=t;
  for(let i=0;i<planetMats.length;i++) planetMats[i].uniforms.uTime.value=t;
  for(let i=0;i<helixMats.length;i++) helixMats[i].uniforms.uTime.value=t;
  for(let i=0;i<starfieldMats.length;i++) starfieldMats[i].uniforms.uTime.value=t;
  crysMat.uniforms.uTime.value=t;
  busNode.scale.setScalar(1+0.14*Math.sin(t*2.1)); busNode.material.emissiveIntensity=0.8+0.5*Math.sin(t*2.1);
  for(let i=0;i<FLOW_N;i++){const f=(flowSeed[i]+t*0.045)%1.0; const y=FLOW_Y0+(FLOW_Y1-FLOW_Y0)*f; const a=f*HELIX_TURNS*6.28318+(i%2)*Math.PI;
    flowPos[i*3]=Math.cos(a)*HELIX_R; flowPos[i*3+1]=y; flowPos[i*3+2]=Math.sin(a)*HELIX_R;
    const env=Math.min(1,f/0.1)*Math.min(1,(1-f)/0.12); flowCol[i*3]=env;flowCol[i*3+1]=env;flowCol[i*3+2]=env;}
  flowGeo.attributes.position.needsUpdate=true; flowGeo.attributes.color.needsUpdate=true;
  heart.rotation.y+=dt*0.45;
  for(let i=0;i<BR_N;i++){const f=(brSeed[i]+t*0.22)%1.0,dir=(i%2?1:-1),x=dir>0?-13+26*f:13-26*f;brPos[i*3]=x;brPos[i*3+1]=Math.sin(f*3.14159)*2.3*dir;brPos[i*3+2]=Math.sin(f*6.28+brSeed[i]*6.28)*0.9;}
  brGeo.attributes.position.needsUpdate=true;
  const b=1+0.04*Math.sin(t*1.3); carson.scale.setScalar(b); elvis.scale.setScalar(1+0.04*Math.sin(t*1.3+1.4));
  if(source.userData.glory){source.userData.glory.material.rotation+=dt*0.025; source.userData.glory.scale.setScalar(96*(1+0.035*Math.sin(t*0.55)));}
  heavenClouds.forEach(sp=>{const p=sp.userData.phase;sp.material.opacity=sp.userData.base*(0.84+0.16*Math.sin(t*0.22+p));sp.scale.set(sp.userData.sx*(1+0.018*Math.sin(t*0.12+p)),sp.userData.sy*(1+0.028*Math.cos(t*0.15+p)),1);sp.position.x+=Math.sin(t*0.11+p)*dt*0.11;});
  heavenVeils.forEach(sp=>{const p=sp.userData.phase;sp.material.opacity=sp.userData.base*(0.78+0.22*Math.sin(t*0.38+p));sp.scale.set(sp.userData.sx*(1+0.025*Math.sin(t*0.16+p)),sp.userData.sy*(1+0.018*Math.cos(t*0.14+p)),1);});
  crystal.rotation.y+=dt*0.12; crystal.rotation.x+=dt*0.05; lattice.rotation.y-=dt*0.08; lattice.rotation.x+=dt*0.045;
  planets.forEach(p=>{p.pivot.rotation.y+=dt*p.pl.speed;p.mesh.rotation.y+=dt*0.3;if(p.om)p.om.uniforms.uAngle.value=-p.pivot.rotation.y;if(p.mesh.userData.adisk)p.mesh.userData.adisk.rotation.y+=dt*0.5;});
  for(let i=0;i<moons.length;i++) moons[i].pivot.rotation.y+=dt*moons[i].speed;
  if(workersFX){const wf=workersFX; wf.wPivot.rotation.y+=dt*0.085;
    for(let i=0;i<wf.WN;i++){const e=Math.pow(Math.max(0,Math.sin(t*1.25+wf.wPhase[i])),1.6); wf.wCol[i*3]=e*0.82;wf.wCol[i*3+1]=e*0.9;wf.wCol[i*3+2]=e;}
    wf.wg.attributes.color.needsUpdate=true;}
  // floating card: anchor to its body (offset up), billboard to face camera, scale grows as you zoom in
  if(floater){
    const a=floater.userData.anchor;
    if(a){a.getWorldPosition(_tv); floater.position.copy(_tv); floater.position.y += 7;}
    floater.quaternion.copy(camera.quaternion);
  }
  composer.render(); labelR.render(scene,camera); css3d.render(scene,camera);
  if(!(STILL && ++frames>6)) requestAnimationFrame(animate);
}
animate();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);labelR.setSize(innerWidth,innerHeight);css3d.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);gradePass.uniforms.uAspect.value=innerWidth/innerHeight;});
